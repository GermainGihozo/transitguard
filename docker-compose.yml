version: '3.8'

services:
  # MariaDB Database
  db:
    image: mariadb:10.11
    container_name: transitguard-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-transitguard_prod}
      MYSQL_USER: ${DB_USER:-transitguard}
      MYSQL_PASSWORD: ${DB_PASSWORD:-transitguard123}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - transitguard-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transitguard-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_USER: ${DB_USER:-transitguard}
      DB_PASSWORD: ${DB_PASSWORD:-transitguard123}
      DB_NAME: ${DB_NAME:-transitguard_prod}
      JWT_SECRET: ${JWT_SECRET}
      BIOMETRIC_SECRET: ${BIOMETRIC_SECRET}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - transitguard-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db_data:
    driver: local

networks:
  transitguard-network:
    driver: bridge
