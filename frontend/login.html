<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitGuard - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1e293b;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .nav-tabs {
      border-bottom: 2px solid #334155;
    }
    .nav-tabs .nav-link {
      color: #94a3b8;
      border: none;
    }
    .nav-tabs .nav-link.active {
      background: transparent;
      color: #3b82f6;
      border-bottom: 2px solid #3b82f6;
    }
    .form-control {
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
    }
    .form-control:focus {
      background: #0f172a;
      border-color: #3b82f6;
      color: white;
    }
    .btn-primary {
      background: #3b82f6;
      border: none;
      padding: 12px;
      font-weight: 600;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="text-center mb-4">
    <h2>🚍 TransitGuard</h2>
    <p class="text-muted">Smart Biometric Passenger Tracking</p>
  </div>

  <ul class="nav nav-tabs mb-4" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="password-tab" data-bs-toggle="tab" 
              data-bs-target="#password-login" type="button">
        Password Login
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="biometric-tab" data-bs-toggle="tab" 
              data-bs-target="#biometric-login" type="button">
        Biometric Login
      </button>
    </li>
  </ul>

  <div class="tab-content">
    
    <!-- Password Login -->
    <div class="tab-pane fade show active" id="password-login">
      <form id="passwordLoginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
    </div>

    <!-- Biometric Login -->
    <div class="tab-pane fade" id="biometric-login">
      <form id="biometricLoginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="bioEmail" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Fingerprint (Simulated)</label>
          <input type="text" class="form-control" id="fingerprint" 
                 placeholder="Enter fingerprint template" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          🔐 Biometric Login
        </button>
      </form>
    </div>

  </div>

  <div id="errorMessage" class="mt-3"></div>

  <div class="text-center mt-4">
    <a href="index.html" class="text-muted">← Back to Home</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script>
// Redirect if already logged in
if (Auth.isAuthenticated()) {
  Auth.redirectToDashboard();
}

// Password Login
document.getElementById("passwordLoginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorDiv = document.getElementById("errorMessage");
  
  // Clear previous errors
  errorDiv.innerHTML = '';
  
  // Client-side validation
  if (!email) {
    errorDiv.innerHTML = '<div class="alert alert-danger">Please enter your email address</div>';
    return;
  }
  
  if (!password) {
    errorDiv.innerHTML = '<div class="alert alert-danger">Please enter your password</div>';
    return;
  }
  
  errorDiv.innerHTML = '<div class="text-center"><div class="spinner-border spinner-border-sm"></div> Logging in...</div>';
  
  try {
    const response = await fetch(`${CONFIG.API_BASE_URL}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      Auth.setAuth(data.token, data.user);
      errorDiv.innerHTML = '<div class="alert alert-success">✓ Login successful! Redirecting...</div>';
      setTimeout(() => Auth.redirectToDashboard(), 1000);
    } else {
      // Display clear error messages
      let errorMessage = data.message || 'Login failed';
      
      if (data.errors && Array.isArray(data.errors)) {
        errorMessage = '<ul class="mb-0">' + data.errors.map(err => `<li>${err}</li>`).join('') + '</ul>';
      }
      
      errorDiv.innerHTML = `<div class="alert alert-danger">${errorMessage}</div>`;
    }
  } catch (error) {
    errorDiv.innerHTML = '<div class="alert alert-danger">Unable to connect to server. Please check your connection and try again.</div>';
  }
});

// Biometric Login
document.getElementById("biometricLoginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  
  const email = document.getElementById("bioEmail").value;
  const fingerprint = document.getElementById("fingerprint").value;
  const errorDiv = document.getElementById("errorMessage");
  
  // Clear previous errors
  errorDiv.innerHTML = '';
  
  // Client-side validation
  if (!email) {
    errorDiv.innerHTML = '<div class="alert alert-danger">Please enter your email address</div>';
    return;
  }
  
  if (!fingerprint) {
    errorDiv.innerHTML = '<div class="alert alert-danger">Please enter fingerprint template</div>';
    return;
  }
  
  errorDiv.innerHTML = '<div class="text-center"><div class="spinner-border spinner-border-sm"></div> Verifying biometric...</div>';
  
  try {
    const response = await fetch(`${CONFIG.API_BASE_URL}/auth/biometric-login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        email, 
        fingerprint_template: fingerprint 
      })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      Auth.setAuth(data.token, data.user);
      errorDiv.innerHTML = '<div class="alert alert-success">✓ Biometric verified! Redirecting...</div>';
      setTimeout(() => Auth.redirectToDashboard(), 1000);
    } else {
      // Display clear error messages
      let errorMessage = data.message || 'Biometric verification failed';
      
      if (data.errors && Array.isArray(data.errors)) {
        errorMessage = '<ul class="mb-0">' + data.errors.map(err => `<li>${err}</li>`).join('') + '</ul>';
      }
      
      errorDiv.innerHTML = `<div class="alert alert-danger">${errorMessage}</div>`;
    }
  } catch (error) {
    errorDiv.innerHTML = '<div class="alert alert-danger">Unable to connect to server. Please check your connection and try again.</div>';
  }
});
</script>

<script src="js/page-protection.js"></script>
<script>
  // Redirect logged-in users to their dashboard
  protectPublicPage();
</script>

</body>
</html>
