<!DOCTYPE html>
<html>
<head>
  <title>Register Passenger - TransitGuard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }
    .register-card {
      max-width: 500px;
      margin: 2rem auto;
    }
    .form-label {
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card shadow-lg register-card">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
        <h3 class="text-primary mt-2">Register New Passenger</h3>
        <p class="text-muted">Enter passenger details and biometric data</p>
      </div>

      <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
      <div id="successAlert" class="alert alert-success d-none" role="alert"></div>

      <form id="registerForm">
        <div class="mb-3">
          <label for="full_name" class="form-label">
            <i class="bi bi-person"></i> Full Name <span class="text-danger">*</span>
          </label>
          <input 
            type="text" 
            class="form-control" 
            id="full_name"
            name="full_name" 
            placeholder="Enter full name" 
            required
            minlength="2"
            maxlength="100">
          <div class="form-text">Minimum 2 characters</div>
        </div>

        <div class="mb-3">
          <label for="national_id" class="form-label">
            <i class="bi bi-card-text"></i> National ID
          </label>
          <input 
            type="text" 
            class="form-control" 
            id="national_id"
            name="national_id" 
            placeholder="Enter national ID (optional)"
            minlength="5"
            maxlength="50">
          <div class="form-text">5-50 characters (optional)</div>
        </div>

        <div class="mb-3">
          <label for="passport_number" class="form-label">
            <i class="bi bi-passport"></i> Passport Number
          </label>
          <input 
            type="text" 
            class="form-control" 
            id="passport_number"
            name="passport_number" 
            placeholder="Enter passport number (optional)">
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">
            <i class="bi bi-telephone"></i> Phone Number
          </label>
          <input 
            type="tel" 
            class="form-control" 
            id="phone"
            name="phone" 
            placeholder="+250788123456"
            pattern="^\+?[\d\s-]{10,}$">
          <div class="form-text">Format: +250788123456 (optional)</div>
        </div>

        <div class="mb-4">
          <label for="fingerprint" class="form-label">
            <i class="bi bi-fingerprint"></i> Fingerprint Template <span class="text-danger">*</span>
          </label>
          <textarea 
            class="form-control" 
            id="fingerprint"
            name="fingerprint" 
            placeholder="Paste fingerprint biometric data" 
            rows="3"
            required
            minlength="10"></textarea>
          <div class="form-text">Minimum 10 characters</div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-check-circle"></i> Register & Assign Ticket
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="login.html" class="text-decoration-none">
          <i class="bi bi-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const errorDiv = document.getElementById('errorAlert');
  const successDiv = document.getElementById('successAlert');
  
  // Hide previous messages
  errorDiv.classList.add('d-none');
  successDiv.classList.add('d-none');

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  // Client-side validation
  const errors = [];

  if (!data.full_name || data.full_name.trim().length < 2) {
    errors.push('Full name must be at least 2 characters');
  }

  if (data.national_id && (data.national_id.length < 5 || data.national_id.length > 50)) {
    errors.push('National ID must be between 5 and 50 characters');
  }

  if (data.phone && !/^\+?[\d\s-]{10,}$/.test(data.phone)) {
    errors.push('Please enter a valid phone number (e.g., +250788123456)');
  }

  if (!data.fingerprint || data.fingerprint.length < 10) {
    errors.push('Fingerprint template must be at least 10 characters');
  }

  if (errors.length > 0) {
    errorDiv.innerHTML = '<strong>Please fix the following:</strong><ul class="mb-0 mt-2">' + 
      errors.map(err => `<li>${err}</li>`).join('') + '</ul>';
    errorDiv.classList.remove('d-none');
    return;
  }

  try {
    const res = await fetch('/api/passengers/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
      successDiv.innerHTML = '<i class="bi bi-check-circle"></i> ' + result.message;
      successDiv.classList.remove('d-none');
      this.reset();
      
      // Scroll to top to show success message
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      let errorMessage = result.message || 'Registration failed';
      
      if (result.errors && Array.isArray(result.errors)) {
        errorMessage = '<strong>Validation errors:</strong><ul class="mb-0 mt-2">' + 
          result.errors.map(err => `<li>${err}</li>`).join('') + '</ul>';
      }
      
      errorDiv.innerHTML = errorMessage;
      errorDiv.classList.remove('d-none');
    }
  } catch (error) {
    errorDiv.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Unable to connect to server. Please check your connection.';
    errorDiv.classList.remove('d-none');
  }
});
</script>

<script src="js/page-protection.js"></script>
<script>
  // Redirect logged-in users to their dashboard
  protectPublicPage();
</script>

</body>
</html>
