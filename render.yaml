services:
  # Full-Stack Web Service (Backend + Frontend)
  - type: web
    name: transitguard
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: transitguard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BIOMETRIC_SECRET
        generateValue: true
      - key: RATE_LIMIT_MAX
        value: 100
    healthCheckPath: /

databases:
  # PostgreSQL Database (Render free tier)
  - name: transitguard-db
    databaseName: transitguard_prod
    user: transitguard_user
    plan: free
