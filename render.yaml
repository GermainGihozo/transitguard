services:
  # Backend API Service
  - type: web
    name: transitguard-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: BIOMETRIC_SECRET
        generateValue: true
      - key: RATE_LIMIT_MAX
        value: 100
    healthCheckPath: /

  # Frontend Static Site
  - type: web
    name: transitguard-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # MySQL Database
  - name: transitguard-db
    databaseName: transitguard_prod
    user: transitguard_user
    plan: free
